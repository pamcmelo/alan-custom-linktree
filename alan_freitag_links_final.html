<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Alan Freitag — BDM Global, Vantage Markets. Parceiros IBs em LATAM, Europa e Ásia.">
<title>Alan Freitag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A96E;
    --ink: #0D0F14;
    --ink-mid: #1E2028;
    --ink-muted: #7A7F8E;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #ECEAE4;
    --btn-bg: #F4F2EE;
    --radius: 14px;
    --body-max: 480px;
    --header-max: 860px;
  }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .header-wrap {
    width: 100%;
    background: var(--bg);
    display: flex;
    justify-content: center;
  }
  .header {
    position: relative;
    width: 100%;
    max-width: var(--header-max);
    height: 420px;
    overflow: hidden;
  }
  @media (min-width: 640px) {
    .header { height: 68vh; min-height: 460px; max-height: 700px; }
  }
  .header-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .header-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13,15,20,0.0)  0%,
      rgba(13,15,20,0.0)  42%,
      rgba(13,15,20,0.55) 74%,
      rgba(13,15,20,0.88) 100%
    );
  }
  .header-text {
    position: absolute;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: var(--body-max);
    padding: 0 24px;
  }
  .header-name {
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.7px;
    line-height: 1.1;
    margin-bottom: 5px;
  }
  @media (min-width: 640px) {
    .header-name { font-size: 38px; }
  }
  .header-role {
    font-size: 11px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 1.4px;
    text-transform: uppercase;
  }
  .body {
    max-width: var(--body-max);
    margin: 0 auto;
    padding: 28px 20px 56px;
    display: flex;
    flex-direction: column;
  }
  .bio {
    font-size: 15px;
    color: var(--ink-mid);
    line-height: 1.68;
    margin-bottom: 28px;
  }
  .cta-primary {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--ink);
    border-radius: var(--radius);
    padding: 17px 20px;
    color: #fff;
    text-decoration: none;
    margin-bottom: 10px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .cta-primary:hover { opacity: 0.88; }
  .cta-icon-wrap {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 21px; flex-shrink: 0;
  }
  .cta-text { flex: 1; }
  .cta-eyebrow {
    display: block;
    font-size: 10px; font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .cta-label { display: block; font-size: 15px; font-weight: 600; color: #fff; }
  .cta-arrow { font-size: 20px; color: rgba(255,255,255,0.35); }
  .links-secondary { display: flex; flex-direction: column; gap: 8px; }
  .btn-sec {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--ink); text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }
  .btn-sec:hover { background: var(--btn-bg); }
  .btn-sec-icon {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--btn-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .btn-sec-text { flex: 1; }
  .btn-sec-eyebrow { display: block; font-size: 10px; color: var(--ink-muted); font-weight: 400; margin-bottom: 1px; }
  .btn-sec-label { display: block; font-size: 13px; font-weight: 500; color: var(--ink); }
  .btn-sec-arrow { font-size: 18px; color: #C8C5BE; }
  .divider { width: 100%; height: 0.5px; background: var(--border); margin: 20px 0; }
  .footer {
    text-align: center; font-size: 11px;
    color: #C4C1BA; letter-spacing: 0.3px;
    padding-top: 8px;
  }
  .footer-dot { margin: 0 5px; color: var(--gold); opacity: 0.5; }
</style>
</head>
